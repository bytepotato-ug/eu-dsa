name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx vitest run

      - name: Test coverage
        if: matrix.node-version == 22
        run: npx vitest run --coverage

      - name: Build
        run: npm run build

      - name: Verify package exports
        run: |
          node -e "
          const fs = require('fs');
          const pkg = require('./package.json');
          for (const [exp, entry] of Object.entries(pkg.exports)) {
            const js = entry.import;
            const dts = entry.types;
            if (!fs.existsSync(js)) { console.error('MISSING: ' + js); process.exit(1); }
            if (!fs.existsSync(dts)) { console.error('MISSING: ' + dts); process.exit(1); }
            console.log(exp + ': OK');
          }
          "
